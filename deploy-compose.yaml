services:
  llama-web-manager-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://192.168.1.153:9000}
    image: llama-web-manager-frontend
    ports:
      - '8002:8000'
    healthcheck:
      test:
        - CMD
        - wget
        - '--no-verbose'
        - '--tries=1'
        - '--spider'
        - 'http://127.0.0.1:8000/'
      interval: 15s
      timeout: 10s
      retries: 3
