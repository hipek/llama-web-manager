services:
  llama-web-manager-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: llama-web-manager-frontend
    ports:
      - '8002:8000'
    healthcheck:
      test:
        - CMD
        - wget
        - '--no-verbose'
        - '--tries=1'
        - '--spider'
        - 'http://localhost:8000/'
      interval: 15s
      timeout: 10s
      retries: 3
